name: Frontend Tests

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'frontend/**'
      - 'tests/frontend/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'frontend/**'
      - 'tests/frontend/**'
      - '.github/workflows/frontend-tests.yml'

jobs:
  unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Run validation unit tests
      run: node --test tests/frontend/test_validation.mjs

    - name: Run API unit tests
      run: node --test tests/frontend/test_api.mjs

  integration-tests:
    name: Frontend Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic pydantic-settings python-multipart
        pip install datasets

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Playwright
      run: |
        npm init -y --silent
        npm install @playwright/test
        npx playwright install chromium --with-deps

    - name: Run Playwright integration tests
      run: npx playwright test --config tests/frontend/playwright.config.mjs
      env:
        CI: true

    - name: Upload test artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: |
          test-results/
          playwright-report/
        retention-days: 7

  test-summary:
    name: Frontend Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
    - name: Check results
      run: |
        echo "## Frontend Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ needs.unit-tests.result }}" = "success" ]; then
          echo "- ✅ Unit tests passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ Unit tests failed" >> $GITHUB_STEP_SUMMARY
        fi
        if [ "${{ needs.integration-tests.result }}" = "success" ]; then
          echo "- ✅ Integration tests passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ Integration tests failed" >> $GITHUB_STEP_SUMMARY
        fi
