name: Docker Image

# Builds and pushes ghcr.io/schneewolf-labs/merlina
#   - `latest` on pushes to main
#   - `X.Y.Z` + `latest` on v* tags
# PRs that touch the Docker setup get a build-only check (no push).

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - docker-compose.yml
      - requirements.txt
      - .github/workflows/docker.yml
  workflow_dispatch:

jobs:
  docker:
    name: Build${{ github.event_name != 'pull_request' && ' and push' || '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # The PyTorch CUDA base image is ~8 GB; reclaim runner disk first
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/schneewolf-labs/merlina
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
