name: Publish to PyPI

# Publishes when a GitHub release is created (e.g. from a v* tag).
# Uses PyPI "trusted publishing" (OIDC) — no API token secret needed, but the
# repository must be registered as a trusted publisher for the `merlina`
# project on pypi.org (Settings -> Publishing on PyPI):
#   owner: Schneewolf-Labs, repo: Merlina,
#   workflow: publish.yml, environment: pypi

on:
  release:
    types: [published]
  workflow_dispatch:  # manual run builds + smoke-tests but does not publish

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Smoke-test wheel in a clean environment
        run: |
          python -m venv /tmp/smoke
          # --no-deps: only verifies packaging + the import-light CLI path
          /tmp/smoke/bin/pip install --no-deps dist/*.whl
          /tmp/smoke/bin/merlina --version
          # Without torch, `merlina serve` must fail gracefully (exit 1 + hint)
          /tmp/smoke/bin/merlina serve && exit 1 || test $? -eq 1

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/merlina
    permissions:
      id-token: write  # required for trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
